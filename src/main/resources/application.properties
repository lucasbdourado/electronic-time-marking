spring.application.name=electronic-time-marking
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/electronic-time-marking}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}


### Rabbit MQ ###
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

### Quartz ###
spring.quartz.job-store-type=${QUARTZ_JOB_STORE_TYPE:jdbc}
spring.quartz.jdbc.initialize-schema=${QUARTZ_INITIALIZE_SCHEMA:always}
spring.quartz.overwrite-existing-jobs=${QUARTZ_OVERWRITE_EXISTING_JOBS:true}
